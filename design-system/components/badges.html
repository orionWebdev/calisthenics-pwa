<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Badges &amp; Pills</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-primary:#000; --bg-card:#161618;
    --text-primary:#fff; --text-secondary:#9ca3af; --text-tertiary:#6b7280;
    --border-primary:rgba(255,255,255,.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); padding:32px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .sub { color:var(--text-secondary); font-size:14px; margin-top:4px; }
  h2 { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-secondary); margin:32px 0 14px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

  .pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 12px; border-radius:999px; }
  .dot { width:8px; height:8px; border-radius:50%; }

  /* Difficulty */
  .diff { display:inline-flex; gap:3px; align-items:center; padding:5px 10px; border-radius:999px; background:var(--bg-card); border:1px solid var(--border-primary); }
  .diff .bar { width:6px; height:14px; border-radius:2px; background:#3a3a3c; }
  .diff .bar.on { background:linear-gradient(180deg,#F02277,#C01963); }
  .diff .lbl { font-size:11px; color:var(--text-secondary); margin-left:4px; }
</style>
</head>
<body>
  <h1>Badges &amp; Pills</h1>
  <p class="sub">Status-Farben immer als Tint (8–12%) + farbiger Text/Dot — nie vollflächig grell.</p>

  <h2>Difficulty 1–5</h2>
  <div class="row">
    <span class="diff"><span class="bar on"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="lbl">1 · Einsteiger</span></span>
    <span class="diff"><span class="bar on"></span><span class="bar on"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="lbl">2</span></span>
    <span class="diff"><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="bar"></span><span class="bar"></span><span class="lbl">3</span></span>
    <span class="diff"><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="bar"></span><span class="lbl">4</span></span>
    <span class="diff"><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="bar on"></span><span class="lbl">5 · Profi</span></span>
  </div>

  <h2>Form-Zonen</h2>
  <div class="row">
    <span class="pill" style="background:rgba(239,68,68,.10);color:#ef4444"><span class="dot" style="background:#ef4444"></span>Exhausted</span>
    <span class="pill" style="background:rgba(249,115,22,.10);color:#f97316"><span class="dot" style="background:#f97316"></span>Fatigued</span>
    <span class="pill" style="background:rgba(234,179,8,.10);color:#eab308"><span class="dot" style="background:#eab308"></span>Loaded</span>
    <span class="pill" style="background:rgba(34,197,94,.10);color:#22c55e"><span class="dot" style="background:#22c55e"></span>Ready</span>
    <span class="pill" style="background:rgba(59,130,246,.10);color:#3b82f6"><span class="dot" style="background:#3b82f6"></span>Fresh</span>
    <span class="pill" style="background:rgba(139,92,246,.10);color:#8b5cf6"><span class="dot" style="background:#8b5cf6"></span>Peak Form</span>
    <span class="pill" style="background:rgba(142,142,147,.10);color:#8e8e93"><span class="dot" style="background:#8e8e93"></span>Form Loss</span>
  </div>

  <h2>Kategorien</h2>
  <div class="row">
    <span class="pill" style="background:rgba(227,87,69,.12);color:#e35745"><span class="dot" style="background:#e35745"></span>Strength</span>
    <span class="pill" style="background:rgba(245,158,11,.12);color:#f59e0b"><span class="dot" style="background:#f59e0b"></span>Bodyweight</span>
    <span class="pill" style="background:rgba(59,130,246,.12);color:#3b82f6"><span class="dot" style="background:#3b82f6"></span>Cardio</span>
    <span class="pill" style="background:rgba(34,197,94,.12);color:#22c55e"><span class="dot" style="background:#22c55e"></span>Recovery</span>
  </div>
</body>
</html>

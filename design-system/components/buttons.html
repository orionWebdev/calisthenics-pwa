<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-primary: #000000; --bg-card: #161618;
    --text-primary: #FFFFFF; --text-secondary: #9ca3af; --text-tertiary: #6b7280;
    --border-primary: rgba(255,255,255,0.10);
    --color-primary: #C01963; --color-primary-light: #F02277;
    --gradient-cta: linear-gradient(135deg,#C01963 0%,#F02277 100%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); padding:32px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .sub { color:var(--text-secondary); font-size:14px; margin-top:4px; }
  h2 { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-secondary); margin:32px 0 14px; }
  .material-symbols-rounded { font-size:20px; line-height:1; }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }

  .btn { font-family:inherit; font-weight:600; border:none; cursor:pointer; border-radius:14px;
         display:inline-flex; align-items:center; justify-content:center; gap:8px;
         padding:0 22px; height:48px; font-size:15px; transition:all .15s ease; }
  .btn-primary { background:var(--gradient-cta); color:#fff; box-shadow:0 6px 20px rgba(192,25,99,.30); }
  .btn-primary.is-hover { filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 10px 28px rgba(192,25,99,.45); }
  .btn-secondary { background:transparent; color:#fff; border:1.5px solid var(--border-primary); }
  .btn-secondary.is-hover { border-color:var(--color-primary-light); color:var(--color-primary-light); }
  .btn-ghost { background:transparent; color:var(--text-secondary); }
  .btn-ghost.is-hover { color:#fff; background:rgba(255,255,255,.06); }
  .btn:disabled, .btn.is-disabled { opacity:.4; cursor:not-allowed; box-shadow:none; transform:none; }

  .btn-icon { width:48px; height:48px; padding:0; border-radius:50%; }
  .btn-sm { height:38px; padding:0 16px; font-size:13px; border-radius:11px; }
  .btn-lg { height:56px; padding:0 28px; font-size:17px; border-radius:16px; }
  .btn-full { width:100%; }
  .label { font-size:11px; color:var(--text-tertiary); margin-bottom:8px; }
  .cell { display:flex; flex-direction:column; }
  .phone { max-width:320px; }
</style>
</head>
<body>
  <h1>Buttons</h1>
  <p class="sub">Primär = Gradient-Fill, sparsam. Sekundär = Border, Ghost = nur Text. Touch-Target ≥ 44px.</p>

  <h2>Varianten</h2>
  <div class="row">
    <button class="btn btn-primary"><span class="material-symbols-rounded">add</span>Workout loggen</button>
    <button class="btn btn-secondary">Plan wählen</button>
    <button class="btn btn-ghost">Abbrechen</button>
    <button class="btn btn-primary btn-icon"><span class="material-symbols-rounded">add</span></button>
    <button class="btn btn-secondary btn-icon"><span class="material-symbols-rounded">tune</span></button>
  </div>

  <h2>States (Primär)</h2>
  <div class="row">
    <div class="cell"><span class="label">Default</span><button class="btn btn-primary">Speichern</button></div>
    <div class="cell"><span class="label">Hover</span><button class="btn btn-primary is-hover">Speichern</button></div>
    <div class="cell"><span class="label">Disabled</span><button class="btn btn-primary is-disabled">Speichern</button></div>
  </div>
  <h2>States (Sekundär &amp; Ghost)</h2>
  <div class="row">
    <div class="cell"><span class="label">Default</span><button class="btn btn-secondary">Filter</button></div>
    <div class="cell"><span class="label">Hover</span><button class="btn btn-secondary is-hover">Filter</button></div>
    <div class="cell"><span class="label">Ghost Hover</span><button class="btn btn-ghost is-hover">Verwerfen</button></div>
  </div>

  <h2>Größen</h2>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Medium</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>

  <h2>Full-width (mobile CTA)</h2>
  <div class="phone">
    <button class="btn btn-primary btn-full btn-lg"><span class="material-symbols-rounded">play_arrow</span>Workout starten</button>
  </div>
</body>
</html>

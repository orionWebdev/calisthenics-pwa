<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Screen: Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-primary:#000; --text-primary:#fff; --text-secondary:#9ca3af; --text-tertiary:#6b7280;
    --color-primary:#C01963; --color-primary-light:#F02277;
    --gradient-cta:linear-gradient(135deg,#C01963,#F02277);
    --surface:#1c1c20;
    --card-grad:linear-gradient(157deg,#1c1c20 0%,#141417 52%,#0f0f11 100%);
    --card-border:rgba(255,255,255,.07);
    --card-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif;
    background:radial-gradient(120% 60% at 50% -5%, rgba(192,25,99,.08), transparent 55%), var(--bg-primary);
    color:var(--text-primary); min-height:920px; }
  .phone { max-width:412px; margin:0 auto; padding:0 16px 120px; position:relative; }
  .material-symbols-rounded { line-height:1; }
  .card { position:relative; background:var(--card-grad); border:1px solid var(--card-border); border-radius:20px; box-shadow:var(--card-shadow); }

  /* Top bar */
  .wk-top { display:flex; align-items:center; gap:12px; padding:16px 2px 10px; }
  .icon-btn { width:40px; height:40px; border-radius:12px; background:var(--card-grad); border:1px solid var(--card-border); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .wk-titlewrap { flex:1; text-align:center; }
  .wk-title { font-size:16px; font-weight:700; }
  .wk-timer { font-size:13px; color:var(--color-primary-light); font-weight:600; font-variant-numeric:tabular-nums; display:inline-flex; align-items:center; gap:4px; margin-top:1px; }
  .wk-timer .material-symbols-rounded { font-size:14px; }

  /* Progress */
  .wk-progress { margin:8px 2px 18px; }
  .wk-progress .lbl { display:flex; justify-content:space-between; font-size:12px; color:var(--text-secondary); margin-bottom:7px; }
  .track { height:6px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden; }
  .fill { height:100%; width:33%; border-radius:999px; background:var(--gradient-cta); }

  /* Exercise */
  .ex-head { display:flex; align-items:flex-start; justify-content:space-between; margin:2px 2px 12px; }
  .ex-name { font-size:24px; font-weight:700; letter-spacing:-.01em; }
  .ex-target { font-size:13px; color:var(--text-secondary); margin-top:4px; }
  .ex-tag { font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; background:rgba(227,87,69,.16); color:#e35745; }

  .logger { padding:16px 16px 14px; }
  .cols { display:grid; grid-template-columns:40px 1fr 1fr 48px; gap:10px; padding:0 4px 8px; }
  .cols span { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-tertiary); text-align:center; }
  .cols span:first-child { text-align:left; }
  .set-row { display:grid; grid-template-columns:40px 1fr 1fr 48px; gap:10px; align-items:center; padding:7px 4px; border-radius:12px; margin-bottom:3px; }
  .set-row.done { background:rgba(34,197,94,.07); }
  .set-row.active { background:rgba(192,25,99,.10); border:1px solid rgba(192,25,99,.35); }
  .set-no { font-size:14px; font-weight:600; color:var(--text-secondary); }
  .cell { height:44px; background:#0f0f11; border:1px solid var(--card-border); border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:600; font-variant-numeric:tabular-nums; }
  .set-row.active .cell { border-color:var(--color-primary-light); background:#16161a; }
  .cell.empty { color:var(--text-quaternary,#4b5563); }
  .check { width:44px; height:44px; border-radius:11px; border:1.5px solid var(--card-border); background:none; color:var(--text-tertiary); display:flex; align-items:center; justify-content:center; }
  .check .material-symbols-rounded { font-size:22px; }
  .check.on { background:linear-gradient(135deg,#16a34a,#22c55e); border:none; color:#fff; }
  .add-set { width:100%; margin-top:10px; height:44px; background:rgba(255,255,255,.04); border:1px dashed var(--card-border); border-radius:12px; color:var(--text-secondary); font-family:inherit; font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .add-set .material-symbols-rounded { font-size:18px; }

  /* Rest timer */
  .rest { display:flex; align-items:center; gap:12px; padding:14px 16px; margin-top:14px; }
  .rest-ic { width:40px; height:40px; border-radius:12px; background:rgba(192,25,99,.12); border:1px solid rgba(192,25,99,.3); color:var(--color-primary-light); display:flex; align-items:center; justify-content:center; }
  .rest-txt .t1 { font-size:13px; color:var(--text-secondary); }
  .rest-txt .t2 { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:1px; }
  .rest-skip { margin-left:auto; font-size:13px; font-weight:600; color:var(--text-secondary); background:rgba(255,255,255,.06); border:1px solid var(--card-border); border-radius:10px; padding:9px 14px; }

  /* Next up */
  .nextup { display:flex; align-items:center; gap:10px; padding:14px 16px; margin-top:14px; }
  .nextup .material-symbols-rounded { color:var(--text-tertiary); }
  .nextup .nu-lbl { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-tertiary); }
  .nextup .nu-name { font-size:14px; font-weight:600; margin-top:1px; }

  .reveal { opacity:0; transform:translateY(20px); will-change:transform,opacity; transition:opacity .55s cubic-bezier(.22,.7,.2,1), transform .55s cubic-bezier(.22,.7,.2,1); }
  .reveal.in { opacity:1; transform:none; }
  @media (prefers-reduced-motion:reduce){ .reveal{opacity:1;transform:none;transition:none;} }

  /* Fixed bottom CTA */
  .wk-cta { position:fixed; left:50%; transform:translateX(-50%); bottom:16px; width:380px; max-width:calc(100% - 24px); height:56px;
            background:var(--gradient-cta); border:none; border-radius:16px; color:#fff; font-family:inherit; font-weight:700; font-size:16px;
            display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 10px 30px rgba(192,25,99,.45); }
  .wk-cta .material-symbols-rounded { font-size:22px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="wk-top reveal">
      <button class="icon-btn"><span class="material-symbols-rounded">close</span></button>
      <div class="wk-titlewrap">
        <div class="wk-title">Push Day A</div>
        <div class="wk-timer"><span class="material-symbols-rounded">timer</span>12:34</div>
      </div>
      <button class="icon-btn"><span class="material-symbols-rounded">more_horiz</span></button>
    </div>

    <div class="wk-progress reveal">
      <div class="lbl"><span>Übung 2 von 6</span><span>33 %</span></div>
      <div class="track"><div class="fill"></div></div>
    </div>

    <div class="ex-head reveal">
      <div>
        <div class="ex-name">Bankdrücken</div>
        <div class="ex-target">Ziel: 4 × 8 Wdh. · 60 kg</div>
      </div>
      <span class="ex-tag">Brust</span>
    </div>

    <section class="card logger reveal">
      <div class="cols"><span>Satz</span><span>Wdh.</span><span>kg</span><span></span></div>

      <div class="set-row done">
        <span class="set-no">1</span><div class="cell">8</div><div class="cell">60</div>
        <button class="check on"><span class="material-symbols-rounded">check</span></button>
      </div>
      <div class="set-row done">
        <span class="set-no">2</span><div class="cell">8</div><div class="cell">60</div>
        <button class="check on"><span class="material-symbols-rounded">check</span></button>
      </div>
      <div class="set-row active">
        <span class="set-no">3</span><div class="cell">8</div><div class="cell">60</div>
        <button class="check"><span class="material-symbols-rounded">check</span></button>
      </div>
      <div class="set-row">
        <span class="set-no" style="opacity:.5">4</span><div class="cell empty">—</div><div class="cell empty">—</div>
        <button class="check"><span class="material-symbols-rounded">check</span></button>
      </div>

      <button class="add-set"><span class="material-symbols-rounded">add</span>Satz hinzufügen</button>
    </section>

    <section class="card rest reveal">
      <div class="rest-ic"><span class="material-symbols-rounded">timer</span></div>
      <div class="rest-txt"><div class="t1">Pause läuft</div><div class="t2">0:48</div></div>
      <button class="rest-skip">Überspringen</button>
    </section>

    <section class="card nextup reveal">
      <span class="material-symbols-rounded">arrow_forward</span>
      <div><div class="nu-lbl">Als Nächstes</div><div class="nu-name">Schrägbankdrücken · 3 × 10</div></div>
    </section>
  </div>

  <button class="wk-cta"><span class="material-symbols-rounded">check_circle</span>Nächste Übung</button>

  <script>
    (function () {
      var els = [].slice.call(document.querySelectorAll('.reveal'));
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var still = location.search.indexOf('still') !== -1;
      if (reduce || still) { els.forEach(function (el) { el.classList.add('in'); }); return; }
      els.forEach(function (el, i) { el.style.transitionDelay = (i * 70) + 'ms'; });
      var io = new IntersectionObserver(function (es) { es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }); }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });
      els.forEach(function (el) { io.observe(el); });
    })();
  </script>
</body>
</html>

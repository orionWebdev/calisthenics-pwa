<!-- @dsCard group="Patterns" -->
<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Workout Logger-Row</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-primary:#000; --bg-card:#161618; --bg-card-elevated:#1c1c1e;
    --text-primary:#fff; --text-secondary:#9ca3af; --text-tertiary:#6b7280;
    --border-primary:rgba(255,255,255,.10);
    --color-primary:#C01963; --color-primary-light:#F02277;
    --gradient-cta:linear-gradient(135deg,#C01963,#F02277);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); padding:32px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .sub { color:var(--text-secondary); font-size:14px; margin-top:4px; margin-bottom:24px; }
  .material-symbols-rounded { line-height:1; }

  .logger { max-width:400px; background:var(--bg-card); border:1px solid var(--border-primary); border-radius:20px; padding:18px; }
  .log-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .log-name { font-size:17px; font-weight:700; }
  .log-target { font-size:12px; color:var(--text-tertiary); }
  .cols { display:grid; grid-template-columns:40px 1fr 1fr 48px; gap:10px; align-items:center; padding:0 4px; margin:14px 0 6px; }
  .cols span { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-tertiary); text-align:center; }
  .cols span:first-child { text-align:left; }

  .set-row { display:grid; grid-template-columns:40px 1fr 1fr 48px; gap:10px; align-items:center; padding:8px 4px; border-radius:12px; }
  .set-row.done { background:rgba(34,197,94,.06); }
  .set-row.active { background:rgba(192,25,99,.08); border:1px solid rgba(192,25,99,.3); }
  .set-no { font-size:14px; font-weight:600; color:var(--text-secondary); }
  .cell-in { height:42px; background:var(--bg-card-elevated); border:1px solid var(--border-primary); border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; font-variant-numeric:tabular-nums; }
  .set-row.active .cell-in { border-color:var(--color-primary-light); }
  .check { width:42px; height:42px; border-radius:11px; border:1.5px solid var(--border-primary); background:none; color:var(--text-tertiary); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .check .material-symbols-rounded { font-size:22px; }
  .check.on { background:linear-gradient(135deg,#16a34a,#22c55e); border:none; color:#fff; }
  .add-set { width:100%; margin-top:12px; height:44px; background:rgba(255,255,255,.05); border:1px dashed var(--border-primary); border-radius:12px; color:var(--text-secondary); font-family:inherit; font-weight:600; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .rest { display:flex; align-items:center; gap:8px; margin-top:14px; padding:12px 14px; background:var(--bg-card-elevated); border-radius:12px; }
  .rest .material-symbols-rounded { font-size:20px; color:var(--color-primary-light); }
  .rest .t { margin-left:auto; font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <h1>Workout Logger-Row</h1>
  <p class="sub">Live-Set-Logging während des Workouts. Erledigt = grün, aktiver Satz = Brand-Highlight.</p>

  <div class="logger">
    <div class="log-head"><div class="log-name">Bench Press</div><div class="log-target">Ziel: 4 × 8 · 60 kg</div></div>
    <div class="cols"><span>Satz</span><span>Reps</span><span>kg</span><span></span></div>

    <div class="set-row done">
      <span class="set-no">1</span><div class="cell-in">8</div><div class="cell-in">60</div>
      <button class="check on"><span class="material-symbols-rounded">check</span></button>
    </div>
    <div class="set-row done">
      <span class="set-no">2</span><div class="cell-in">8</div><div class="cell-in">60</div>
      <button class="check on"><span class="material-symbols-rounded">check</span></button>
    </div>
    <div class="set-row active">
      <span class="set-no">3</span><div class="cell-in">8</div><div class="cell-in">60</div>
      <button class="check"><span class="material-symbols-rounded">check</span></button>
    </div>
    <div class="set-row">
      <span class="set-no" style="opacity:.5">4</span><div class="cell-in" style="opacity:.5">—</div><div class="cell-in" style="opacity:.5">—</div>
      <button class="check"><span class="material-symbols-rounded">check</span></button>
    </div>

    <button class="add-set"><span class="material-symbols-rounded" style="font-size:18px">add</span>Satz hinzufügen</button>

    <div class="rest"><span class="material-symbols-rounded">timer</span><span style="color:var(--text-secondary);font-size:13px">Pause läuft</span><span class="t">0:48</span></div>
  </div>
</body>
</html>

<!-- @dsCard group="Patterns" -->
<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Plan Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-primary:#000; --bg-card:#161618;
    --text-primary:#fff; --text-secondary:#9ca3af; --text-tertiary:#6b7280;
    --border-primary:rgba(255,255,255,.10);
    --gradient-cta:linear-gradient(135deg,#C01963,#F02277);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); padding:32px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .sub { color:var(--text-secondary); font-size:14px; margin-top:4px; margin-bottom:24px; }
  .material-symbols-rounded { line-height:1; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; max-width:760px; }

  .plan { background:var(--bg-card); border:1px solid var(--border-primary); border-radius:20px; padding:18px 20px; box-shadow:0 4px 24px rgba(0,0,0,.3); }
  .plan-head { display:flex; align-items:flex-start; justify-content:space-between; }
  .plan-name { font-size:18px; font-weight:700; }
  .plan-type { font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; background:rgba(227,87,69,.15); color:#e35745; margin-top:6px; display:inline-block; }
  .plan-icon { width:42px; height:42px; border-radius:12px; background:rgba(255,255,255,.05); border:1px solid var(--border-primary); display:flex; align-items:center; justify-content:center; }
  .plan-meta { display:flex; gap:16px; margin-top:14px; color:var(--text-secondary); font-size:13px; }
  .plan-meta span { display:flex; align-items:center; gap:5px; }
  .plan-meta .material-symbols-rounded { font-size:17px; }
  .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
  .tag { font-size:11px; padding:3px 9px; border-radius:999px; background:rgba(255,255,255,.06); color:var(--text-secondary); }
  .plan-actions { display:flex; gap:10px; margin-top:16px; }
  .btn { font-family:inherit; font-weight:600; border:none; cursor:pointer; border-radius:12px; height:42px; display:inline-flex; align-items:center; justify-content:center; gap:6px; font-size:14px; }
  .btn-primary { background:var(--gradient-cta); color:#fff; flex:1; box-shadow:0 6px 18px rgba(192,25,99,.3); }
  .btn-ghost { background:rgba(255,255,255,.06); color:#fff; width:42px; }
  .btn .material-symbols-rounded { font-size:19px; }
</style>
</head>
<body>
  <h1>Plan Card</h1>
  <p class="sub">Trainingsplan-Übersicht. Typ-Badge, Eckdaten, Muskel-Fokus, direkter Start-CTA.</p>

  <div class="grid">
    <div class="plan">
      <div class="plan-head">
        <div><div class="plan-name">Push Day A</div><span class="plan-type">Strength</span></div>
        <div class="plan-icon"><span class="material-symbols-rounded">fitness_center</span></div>
      </div>
      <div class="plan-meta"><span><span class="material-symbols-rounded">format_list_numbered</span>6 Übungen</span><span><span class="material-symbols-rounded">schedule</span>~45 min</span></div>
      <div class="tags"><span class="tag">Brust</span><span class="tag">Schultern</span><span class="tag">Trizeps</span></div>
      <div class="plan-actions">
        <button class="btn btn-primary"><span class="material-symbols-rounded">play_arrow</span>Starten</button>
        <button class="btn btn-ghost"><span class="material-symbols-rounded">edit</span></button>
      </div>
    </div>

    <div class="plan">
      <div class="plan-head">
        <div><div class="plan-name">Easy Run</div><span class="plan-type" style="background:rgba(59,130,246,.15);color:#3b82f6">Cardio</span></div>
        <div class="plan-icon"><span class="material-symbols-rounded">directions_run</span></div>
      </div>
      <div class="plan-meta"><span><span class="material-symbols-rounded">straighten</span>5 km</span><span><span class="material-symbols-rounded">schedule</span>~30 min</span></div>
      <div class="tags"><span class="tag">Zone 2</span><span class="tag">Grundlage</span></div>
      <div class="plan-actions">
        <button class="btn btn-primary"><span class="material-symbols-rounded">play_arrow</span>Starten</button>
        <button class="btn btn-ghost"><span class="material-symbols-rounded">edit</span></button>
      </div>
    </div>
  </div>
</body>
</html>

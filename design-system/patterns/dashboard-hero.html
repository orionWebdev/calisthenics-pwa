<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATEM Hybrid — Dashboard Form-Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-primary:#000; --bg-card:#161618; --bg-card-elevated:#1c1c1e;
    --text-primary:#fff; --text-secondary:#9ca3af; --text-tertiary:#6b7280;
    --border-primary:rgba(255,255,255,.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Zalando Sans Expanded',-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); padding:32px; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .sub { color:var(--text-secondary); font-size:14px; margin-top:4px; margin-bottom:24px; }

  .hero { max-width:380px; background:var(--bg-card); border:1px solid var(--border-primary); border-radius:24px; padding:28px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.3); }
  .ring-wrap { position:relative; width:200px; height:200px; margin:4px auto 18px; }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-score { font-size:52px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
  .ring-zone { font-size:14px; font-weight:600; color:#22c55e; margin-top:6px; text-transform:uppercase; letter-spacing:.06em; }
  .hero-status { font-size:15px; color:var(--text-secondary); line-height:1.5; }
  .hero-status b { color:#fff; font-weight:600; }
  .legend { display:flex; justify-content:center; gap:14px; margin-top:20px; flex-wrap:wrap; }
  .lg-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-tertiary); }
  .lg-dot { width:8px; height:8px; border-radius:50%; }
</style>
</head>
<body>
  <h1>Dashboard — Form-Hero</h1>
  <p class="sub">Das Herzstück von „Heute": der Form-Status als Ring mit Zonen-Gradient. WHOOP/Oura-Liga.</p>

  <div class="hero">
    <div class="ring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="formGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <circle cx="100" cy="100" r="86" fill="none" stroke="#1c1c1e" stroke-width="14"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="url(#formGrad)" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="540" stroke-dashoffset="151"
                transform="rotate(-90 100 100)"/>
      </svg>
      <div class="ring-center">
        <div class="ring-score">72</div>
        <div class="ring-zone">Ready</div>
      </div>
    </div>
    <p class="hero-status">Dein Körper ist <b>bereit für Belastung</b>. Guter Tag für einen intensiven Push-Block.</p>
    <div class="legend">
      <span class="lg-item"><span class="lg-dot" style="background:#ef4444"></span>Erschöpft</span>
      <span class="lg-item"><span class="lg-dot" style="background:#eab308"></span>Belastet</span>
      <span class="lg-item"><span class="lg-dot" style="background:#22c55e"></span>Bereit</span>
      <span class="lg-item"><span class="lg-dot" style="background:#8b5cf6"></span>Topform</span>
    </div>
  </div>
</body>
</html>
